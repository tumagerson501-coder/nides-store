<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Sign In | Nides Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">NIDES<span>STORE</span></a>
            <div class="header-actions">
                <a href="cart.html" class="action-btn cart-btn">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="auth-viewport-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to manage your orders, trace tracking manifests, and access your profile tier.</p>
            </div>

            <div class="auth-alert-banner hidden" id="auth-status-msg"></div>

            <form id="login-auth-form" novalidate>
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <div class="field-icon-wrapper">
                        <i class="fa-solid fa-envelope field-prepend-icon"></i>
                        <input type="email" id="login-email" required placeholder="you@example.com" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <div class="label-split-row">
                        <label for="login-password">Password</label>
                        <a href="#" class="form-context-link">Forgot password?</a>
                    </div>
                    <div class="field-icon-wrapper">
                        <i class="fa-solid fa-lock field-prepend-icon"></i>
                        <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="password-visibility-toggle" id="pass-toggle" aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-utility-row">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me-flag">
                        <span class="custom-checkmark"></span>
                        Keep me signed in on this machine
                    </label>
                </div>

                <button type="submit" class="btn btn-primary auth-submit-btn">
                    Authenticate Session <i class="fa-solid fa-right-to-bracket"></i>
                </button>
            </form>

            <div class="auth-footer-routing">
                <p>New to Nides Store? <a href="register.html">Create an account</a></p>
            </div>
        </div>
    </main>

    <footer class="main-footer minimal-footer">
        <div class="container footer-bottom">
            <p>&copy; 2026 Nides Store. Secure User Lifecycle Management System Node.</p>
        </div>
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/auth.js" defer></script>
</body>
</html>
